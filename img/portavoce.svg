<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Portavoce">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#1f1633"/>
      <stop offset="100%" stop-color="#0b0f14"/>
    </radialGradient>
    <radialGradient id="gl" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#b486ff" stop-opacity=".40"/>
      <stop offset="100%" stop-color="#b486ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5bd6"/>
      <stop offset="1" stop-color="#c9aeff"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="94" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="94" fill="url(#gl)"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#b486ff" stroke-opacity=".55" stroke-width="2.5"/>

  <!-- faro -->
  <g stroke-linejoin="round">
    <ellipse cx="100" cy="183" rx="26" ry="5" fill="#0e1420"/>
    <polygon points="94,181 106,181 103,158 97,158" fill="#2a3242"/>
    <rect x="95" y="153" width="10" height="5.5" fill="#222a38"/>
    <circle cx="100" cy="156" r="2.8" fill="#dcc6ff"/>
  </g>

  <!-- megafono -->
  <g stroke-linejoin="round">
    <polygon points="66,96 104,80 104,130 66,114" fill="url(#horn)" stroke="#dcc6ff" stroke-opacity=".5" stroke-width="1.4"/>
    <ellipse cx="104" cy="105" rx="6.5" ry="25" fill="#e7d8ff"/>
    <ellipse cx="66" cy="105" rx="3.6" ry="9" fill="#4a2f86"/>
    <rect x="84" y="113" width="9" height="20" rx="3" fill="#4a2f86" transform="rotate(18 88 123)"/>
  </g>

  <!-- onde sonore -->
  <g fill="none" stroke="#b486ff" stroke-linecap="round" stroke-width="3">
    <path d="M118,88 q9,17 0,34" opacity=".9"/>
    <path d="M130,80 q14,25 0,50" opacity=".55"/>
    <path d="M142,72 q19,33 0,66" opacity=".3"/>
  </g>
</svg>
