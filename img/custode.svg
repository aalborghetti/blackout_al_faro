<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Custode">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#11243a"/>
      <stop offset="100%" stop-color="#0b0f14"/>
    </radialGradient>
    <radialGradient id="gl" cx="50%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#4aa3ff" stop-opacity=".42"/>
      <stop offset="100%" stop-color="#4aa3ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flame" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="55%" stop-color="#ffcf6b"/>
      <stop offset="100%" stop-color="#ffcf6b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="94" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="94" fill="url(#gl)"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#4aa3ff" stroke-opacity=".55" stroke-width="2.5"/>

  <!-- faro acceso -->
  <g stroke-linejoin="round">
    <ellipse cx="100" cy="181" rx="30" ry="6" fill="#0e1420"/>
    <polygon points="93,179 107,179 104,150 96,150" fill="#2a3242"/>
    <rect x="95.5" y="164" width="9" height="5" fill="#4aa3ff" opacity=".6"/>
    <rect x="94.5" y="147" width="11" height="3.5" fill="#3a4456"/>
    <circle cx="100" cy="142" r="3.4" fill="#bfe1ff"/>
  </g>

  <!-- lanterna -->
  <g stroke-linejoin="round">
    <path d="M86,80 C90,62 110,62 114,80" fill="none" stroke="#4aa3ff" stroke-width="3" stroke-linecap="round"/>
    <polygon points="83,84 117,84 112,74 88,74" fill="#28333f" stroke="#4aa3ff" stroke-opacity=".5" stroke-width="1.4"/>
    <rect x="96" y="68" width="8" height="7" rx="2" fill="#28333f"/>
    <rect x="82" y="84" width="36" height="48" rx="7" fill="#0d1626" stroke="#4aa3ff" stroke-opacity=".55" stroke-width="2"/>
    <ellipse cx="100" cy="110" rx="20" ry="24" fill="url(#flame)"/>
    <path d="M100,98 C104,104 104,110 100,116 C96,110 96,104 100,98 Z" fill="#fff3c4"/>
    <line x1="100" y1="84" x2="100" y2="132" stroke="#4aa3ff" stroke-opacity=".3" stroke-width="1.2"/>
    <rect x="83" y="132" width="34" height="6" rx="2" fill="#28333f"/>
