<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Sentinella">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#2a2410"/>
      <stop offset="100%" stop-color="#0b0f14"/>
    </radialGradient>
    <radialGradient id="gl" cx="50%" cy="44%" r="58%">
      <stop offset="0%" stop-color="#ffd24a" stop-opacity=".40"/>
      <stop offset="100%" stop-color="#ffd24a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9a0"/>
      <stop offset="100%" stop-color="#e6a519"/>
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="94" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="94" fill="url(#gl)"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#ffd24a" stroke-opacity=".55" stroke-width="2.5"/>

  <!-- faro che scruta -->
  <g stroke-linejoin="round">
    <ellipse cx="100" cy="183" rx="26" ry="5" fill="#0e1420"/>
    <polygon points="94,181 106,181 103,156 97,156" fill="#2a3242"/>
    <rect x="95" y="151" width="10" height="5.5" fill="#222a38"/>
    <circle cx="100" cy="154" r="3" fill="#ffe9a0"/>
  </g>

  <!-- raggi di vigilanza -->
  <g stroke="#ffd24a" stroke-width="2.2" stroke-linecap="round" opacity=".55">
    <line x1="100" y1="40" x2="100" y2="30"/>
    <line x1="58" y1="62" x2="51" y2="55"/>
    <line x1="142" y1="62" x2="149" y2="55"/>
    <line x1="42" y1="100" x2="32" y2="100"/>
    <line x1="158" y1="100" x2="168" y2="100"/>
  </g>

  <!-- occhio -->
  <g>
    <path d="M52,100 C72,74 128,74 148,100 C128,126 72,126 52,100 Z"
          fill="#0d1626" stroke="#ffd24a" stroke-opacity=".7" stroke-width="2.4"/>
    <circle cx="100" cy="100" r="18" fill="url(#iris)"/>
    <circle cx="100" cy="100" r="8.5" fill="#0b0f14"/>
    <circle cx="94" cy="94" r="3.4" fill="#fff" opacity=".85"/>
  </g>
</svg>
