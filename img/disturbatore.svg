<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Disturbatore">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#2e1c08"/>
      <stop offset="100%" stop-color="#0b0f14"/>
    </radialGradient>
    <radialGradient id="gl" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#ff9f43" stop-opacity=".42"/>
      <stop offset="100%" stop-color="#ff9f43" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="1" stop-color="#ff8a1f"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="94" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="94" fill="url(#gl)"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#ff9f43" stroke-opacity=".55" stroke-width="2.5"/>

  <!-- faro in corto -->
  <g stroke-linejoin="round">
    <ellipse cx="100" cy="183" rx="27" ry="5" fill="#0e1420"/>
    <polygon points="93,181 107,181 104,156 96,156" fill="#2a3242"/>
    <rect x="94" y="150" width="12" height="6" fill="#222a38"/>
    <circle cx="100" cy="153" r="3" fill="#ffcaa0" opacity=".7"/>
  </g>

  <!-- saetta del cortocircuito -->
  <path d="M114,50 L80,104 L98,104 L86,150 L126,90 L106,90 L120,50 Z"
        fill="url(#bolt)" stroke="#fff0d6" stroke-opacity=".4" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- scintille -->
  <g fill="#ffd27a">
    <path d="M54,72 l2.2,-6 2.2,6 6,2.2 -6,2.2 -2.2,6 -2.2,-6 -6,-2.2 z"/>
    <path d="M146,118 l2.6,-7 2.6,7 7,2.6 -7,2.6 -2.6,7 -2.6,-7 -7,-2.6 z"/>
    <circle cx="62" cy="128" r="3"/>
    <circle cx="138" cy="64" r="2.4"/>
  </g>
</svg>
